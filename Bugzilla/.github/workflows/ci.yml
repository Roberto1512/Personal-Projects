name: CI

on:
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: python -m pip install -U pip && pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format (check)
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: python -m pip install -U pip && pip install -r requirements.txt

      - name: Pytest
        env:
          PYTHONPATH: .
        run: python -m pytest -q
  
  docker-build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    steps:
      - name: Repo checkout
        uses: actions/checkout@v4
      - name: Docker build
        run: docker build -t naplace-api:ci .

