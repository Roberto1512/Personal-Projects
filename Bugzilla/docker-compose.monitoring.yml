services:
  api:
    build: .
    image: naplace-api:milestone5
    container_name: naplace_api
    ports:
      - "8000:7860"
    environment:
      - PORT=7860
      - NAPLACE_LABELS_PATH=/app/labels/manual_labels.jsonl
    volumes:
      - ./data:/app/data
      - ./models:/app/models:ro
      - labels_data:/app/labels
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: naplace_prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: naplace_grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana

  locust:
    image: locustio/locust:latest
    container_name: naplace_locust
    volumes:
      - ./loadtest:/mnt/locust:ro
    command: -f /mnt/locust/locustfile.py --host http://api:7860
    ports:
      - "8089:8089"
    depends_on:
      - api

volumes:
  grafana_data:
  labels_data:
